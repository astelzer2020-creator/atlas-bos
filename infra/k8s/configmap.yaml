apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/part-of: atlas-bos
data:
  NODE_ENV: production
  API_HOST: 0.0.0.0
  API_PORT: '3001'
  WORKER_HOST: 0.0.0.0
  WORKER_PORT: '3002'
  KAFKA_BROKERS: redpanda:9092
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://atlas@postgres:5432/atlas?schema=public
  CORS_ORIGINS: https://app.example.com
  NEXT_PUBLIC_API_URL: https://api.example.com
  JWT_ACCESS_TTL_SECONDS: '900'
  JWT_REFRESH_TTL_SECONDS: '604800'
  BCRYPT_ROUNDS: '12'
  PROMETHEUS_ENABLED: 'true'