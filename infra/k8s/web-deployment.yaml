apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-web
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: atlas-bos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: atlas-bos
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: atlas-bos/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: atlas-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-web
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: atlas-bos
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atlas-web
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP