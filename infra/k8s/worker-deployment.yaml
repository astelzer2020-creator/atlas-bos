apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-worker
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: atlas-bos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: atlas-bos
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3002'
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: worker
          image: atlas-bos/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']