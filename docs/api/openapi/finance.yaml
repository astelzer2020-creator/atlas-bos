openapi: 3.1.0
info:
  title: Atlas BOS Finance API
  version: 1.0.0
  description: |
    Finance and accounting API for Atlas BOS.
    Manages chart of accounts, journal entries, invoices, payments, bank accounts, and budgets.
    Aligned with `ledger` schema (ATLAS-DB-07).
  contact:
    name: Atlas Platform API Team
    url: https://docs.atlas.example.com
  license:
    name: Proprietary

servers:
  - url: https://api.atlas.example.com
    description: Production
  - url: https://api.staging.atlas.example.com
    description: Staging
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: ChartOfAccounts
    description: General ledger account hierarchy
  - name: JournalEntries
    description: Double-entry journal entries
  - name: Invoices
    description: Sales and purchase invoices
  - name: Payments
    description: Payment receipts and disbursements
  - name: BankAccounts
    description: Bank account management
  - name: Budgets
    description: Budget planning by account and period
  - name: Reconciliations
    description: Bank reconciliation

paths:
  /v1/organizations/{organizationId}/chart-of-accounts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [ChartOfAccounts]
      operationId: listChartOfAccounts
      summary: List chart of accounts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: accountType
          in: query
          schema:
            $ref: '#/components/schemas/AccountType'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: parentAccountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of GL accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccountCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [ChartOfAccounts]
      operationId: createChartOfAccount
      summary: Create GL account
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChartOfAccountCreate'
      responses:
        '201':
          description: GL account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/chart-of-accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [ChartOfAccounts]
      operationId: getChartOfAccount
      summary: Get GL account by ID
      responses:
        '200':
          description: GL account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [ChartOfAccounts]
      operationId: updateChartOfAccount
      summary: Update GL account
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChartOfAccountUpdate'
      responses:
        '200':
          description: GL account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartOfAccount'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [ChartOfAccounts]
      operationId: deleteChartOfAccount
      summary: Soft-delete GL account
      description: System accounts cannot be deleted.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: GL account deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/journal-entries:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [JournalEntries]
      operationId: listJournalEntries
      summary: List journal entries
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/JournalEntryStatus'
        - name: entryType
          in: query
          schema:
            $ref: '#/components/schemas/JournalEntryType'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated list of journal entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [JournalEntries]
      operationId: createJournalEntry
      summary: Create journal entry
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreate'
      responses:
        '201':
          description: Journal entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/journal-entries/{journalEntryId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/JournalEntryId'
    get:
      tags: [JournalEntries]
      operationId: getJournalEntry
      summary: Get journal entry by ID
      responses:
        '200':
          description: Journal entry details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [JournalEntries]
      operationId: updateJournalEntry
      summary: Update draft journal entry
      description: Posted entries are immutable; use reversal instead.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryUpdate'
      responses:
        '200':
          description: Journal entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntry'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [JournalEntries]
      operationId: deleteJournalEntry
      summary: Soft-delete draft journal entry
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Journal entry deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/invoices:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Invoices]
      operationId: listInvoices
      summary: List invoices
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
        - name: invoiceType
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceType'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Invoices]
      operationId: createInvoice
      summary: Create invoice
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/invoices/{invoiceId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/InvoiceId'
    get:
      tags: [Invoices]
      operationId: getInvoice
      summary: Get invoice by ID
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Invoices]
      operationId: updateInvoice
      summary: Update invoice
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceUpdate'
      responses:
        '200':
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Invoices]
      operationId: deleteInvoice
      summary: Soft-delete invoice
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Invoice deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/invoices/{invoiceId}/send:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/InvoiceId'
    post:
      tags: [Invoices]
      operationId: sendInvoice
      summary: Send invoice to customer
      description: |
        Transitions invoice from `draft` to `sent`. Creates journal entry if configured.
        Emits `ledger.invoice.posted.v1` domain event.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendInvoiceRequest'
      responses:
        '200':
          description: Invoice sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/payments:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Payments]
      operationId: listPayments
      summary: List payments
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - name: paymentType
          in: query
          schema:
            $ref: '#/components/schemas/PaymentType'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Payments]
      operationId: createPayment
      summary: Create payment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/payments/{paymentId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/PaymentId'
    get:
      tags: [Payments]
      operationId: getPayment
      summary: Get payment by ID
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Payments]
      operationId: updatePayment
      summary: Update payment
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdate'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Payments]
      operationId: deletePayment
      summary: Soft-delete payment
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Payment deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/payments/record:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Payments]
      operationId: recordPayment
      summary: Record payment with invoice allocations
      description: |
        Creates a completed payment and allocates to one or more invoices.
        Emits `ledger.payment.received.v1` domain event.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordPaymentResponse'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/bank-accounts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [BankAccounts]
      operationId: listBankAccounts
      summary: List bank accounts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of bank accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [BankAccounts]
      operationId: createBankAccount
      summary: Create bank account
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountCreate'
      responses:
        '201':
          description: Bank account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/bank-accounts/{bankAccountId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/BankAccountId'
    get:
      tags: [BankAccounts]
      operationId: getBankAccount
      summary: Get bank account by ID
      responses:
        '200':
          description: Bank account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [BankAccounts]
      operationId: updateBankAccount
      summary: Update bank account
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountUpdate'
      responses:
        '200':
          description: Bank account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [BankAccounts]
      operationId: deleteBankAccount
      summary: Soft-delete bank account
      description: Blocked if open reconciliation exists.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Bank account deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/bank-accounts/{bankAccountId}/reconcile:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/BankAccountId'
    post:
      tags: [Reconciliations]
      operationId: reconcileBankAccount
      summary: Complete bank reconciliation
      description: |
        Creates or completes a reconciliation period matching bank statement
        to book balance. Completed reconciliations are immutable.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileRequest'
      responses:
        '200':
          description: Reconciliation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reconciliation'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/reconciliations:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Reconciliations]
      operationId: listReconciliations
      summary: List reconciliations
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: bankAccountId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReconciliationStatus'
      responses:
        '200':
          description: Paginated list of reconciliations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationCursorPage'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/reconciliations/{reconciliationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ReconciliationId'
    get:
      tags: [Reconciliations]
      operationId: getReconciliation
      summary: Get reconciliation by ID
      responses:
        '200':
          description: Reconciliation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reconciliation'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/budgets:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Budgets]
      operationId: listBudgets
      summary: List budgets
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: fiscalYear
          in: query
          schema:
            type: integer
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of budgets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Budgets]
      operationId: createBudget
      summary: Create budget
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreate'
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/budgets/{budgetId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/BudgetId'
    get:
      tags: [Budgets]
      operationId: getBudget
      summary: Get budget by ID
      responses:
        '200':
          description: Budget details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Budgets]
      operationId: updateBudget
      summary: Update budget
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetUpdate'
      responses:
        '200':
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Budgets]
      operationId: deleteBudget
      summary: Soft-delete budget
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Budget deleted
        default:
          $ref: '#/components/responses/Problem'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JournalEntryId:
      name: journalEntryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BankAccountId:
      name: bankAccountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReconciliationId:
      name: reconciliationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BudgetId:
      name: budgetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: -createdAt
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      schema:
        type: integer

  responses:
    Problem:
      description: RFC 7807 Problem Details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string
          format: uuid
        code:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string

    Pagination:
      type: object
      required: [hasMore, limit]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: [string, 'null']
        prevCursor:
          type: [string, 'null']
        limit:
          type: integer

    CursorPage:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'

    AuditFields:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: [string, 'null']
          format: date-time
        createdBy:
          type: [string, 'null']
          format: uuid
        updatedBy:
          type: [string, 'null']
          format: uuid
        version:
          type: integer
          minimum: 1

    Address:
      type: object
      additionalProperties: true

    AccountType:
      type: string
      enum: [asset, liability, equity, revenue, expense]

