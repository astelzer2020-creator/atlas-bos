        display_name:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        locale:
          type: string
        timezone:
          type: string
        phone:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true

    WorkspaceResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/Workspace'
        meta:
          $ref: '#/components/schemas/Meta'

    WorkspaceListResponse:
      type: object
      required: [data, pagination, meta]
      properties:
