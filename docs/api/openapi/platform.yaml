        title:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        is_owner:
          type: boolean
        is_billing_admin:
          type: boolean
        joined_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
          nullable: true
        role_id:
          type: string
          format: uuid
          nullable: true
          description: Assigned RBAC role (see authorization module)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer

    Invitation:
      type: object
      required: [id, object, organization_id, email, status, invited_by_id, expires_at, created_at, updated_at, version]
      properties:
        id:
          type: string
          format: uuid
        object:
          type: string
          const: invitation
        organization_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        invited_user_id:
          type: string
          format: uuid
          nullable: true
        invited_by_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InvitationStatus'
        role_id:
          type: string
          format: uuid
          nullable: true
        message:
          type: string
          nullable: true
          maxLength: 1000
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer

    User:
      type: object
      required: [id, object, email, email_verified, status, type, locale, timezone, created_at, updated_at, version]
      properties:
        id:
          type: string
          format: uuid
        object:
