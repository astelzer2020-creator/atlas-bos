          type: string
          format: uuid
          nullable: true
        ip_address:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        device_name:
          type: string
          nullable: true
          description: Derived from user agent for display
        mfa_verified:
          type: boolean
        is_remembered:
          type: boolean
        is_current:
          type: boolean
          description: True if this is the session making the request
        expires_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateWorkspaceRequest:
