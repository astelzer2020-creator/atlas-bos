        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
        settings:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer

    UserSummary:
      type: object
      required: [id, email, display_name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true

    Member:
      type: object
      required: [id, object, organization_id, user_id, status, is_owner, is_billing_admin, joined_at, created_at, updated_at, version]
      properties:
        id:
