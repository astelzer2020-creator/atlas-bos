openapi: 3.1.0
info:
  title: Atlas BOS ERP API
  version: 1.0.0
  description: |
    Enterprise Resource Planning API for Atlas BOS.
    Manages products, inventory, warehouses, purchase/sales orders, and suppliers.
    Aligned with `stock` and `commercial` schemas (ATLAS-DB-06).
  contact:
    name: Atlas Platform API Team
    url: https://docs.atlas.example.com
  license:
    name: Proprietary

servers:
  - url: https://api.atlas.example.com
    description: Production
  - url: https://api.staging.atlas.example.com
    description: Staging
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Products
    description: Product catalog management
  - name: ProductVariants
    description: Product variant (SKU) management
  - name: Warehouses
    description: Warehouse and location management
  - name: Inventory
    description: Inventory quantity snapshots
  - name: StockMovements
    description: Immutable inventory movement ledger
  - name: Suppliers
    description: Supplier master data
  - name: PurchaseOrders
    description: Purchase order management
  - name: SalesOrders
    description: Sales order management

paths:
  /v1/organizations/{organizationId}/products:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Products]
      operationId: listProducts
      summary: List products
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
        - name: productType
          in: query
          schema:
            $ref: '#/components/schemas/ProductType'
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Products]
      operationId: createProduct
      summary: Create product
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/products/{productId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Products]
      operationId: getProduct
      summary: Get product by ID
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Products]
      operationId: updateProduct
      summary: Update product
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Products]
      operationId: deleteProduct
      summary: Soft-delete product
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Product deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/products/{productId}/variants:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [ProductVariants]
      operationId: listProductVariants
      summary: List variants for a product
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of product variants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariantCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [ProductVariants]
      operationId: createProductVariant
      summary: Create product variant
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVariantCreate'
      responses:
        '201':
          description: Product variant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/product-variants/{variantId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/VariantId'
    get:
      tags: [ProductVariants]
      operationId: getProductVariant
      summary: Get product variant by ID
      responses:
        '200':
          description: Product variant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [ProductVariants]
      operationId: updateProductVariant
      summary: Update product variant
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVariantUpdate'
      responses:
        '200':
          description: Product variant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [ProductVariants]
      operationId: deleteProductVariant
      summary: Soft-delete product variant
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Product variant deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/warehouses:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Warehouses]
      operationId: listWarehouses
      summary: List warehouses
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of warehouses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Warehouses]
      operationId: createWarehouse
      summary: Create warehouse
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseCreate'
      responses:
        '201':
          description: Warehouse created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/warehouses/{warehouseId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/WarehouseId'
    get:
      tags: [Warehouses]
      operationId: getWarehouse
      summary: Get warehouse by ID
      responses:
        '200':
          description: Warehouse details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Warehouses]
      operationId: updateWarehouse
      summary: Update warehouse
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseUpdate'
      responses:
        '200':
          description: Warehouse updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Warehouses]
      operationId: deleteWarehouse
      summary: Soft-delete warehouse
      description: Blocked if warehouse has positive inventory on hand.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Warehouse deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/inventory:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Inventory]
      operationId: listInventory
      summary: List inventory items
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: productVariantId
          in: query
          schema:
            type: string
            format: uuid
        - name: lowStock
          in: query
          schema:
            type: boolean
          description: Filter items at or below reorder point
      responses:
        '200':
          description: Paginated list of inventory items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItemCursorPage'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/inventory/{inventoryItemId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/InventoryItemId'
    get:
      tags: [Inventory]
      operationId: getInventoryItem
      summary: Get inventory item by ID
      responses:
        '200':
          description: Inventory item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Inventory]
      operationId: updateInventoryItem
      summary: Update inventory item settings
      description: Quantity changes must use stock movements or adjust-stock operation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryItemUpdate'
      responses:
        '200':
          description: Inventory item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/inventory/adjust:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Inventory]
      operationId: adjustStock
      summary: Adjust inventory quantity
      description: |
        Creates an immutable stock movement of type `adjustment` and updates
        inventory quantity on hand. Emits `stock.inventory.adjusted.v1` event.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockRequest'
      responses:
        '200':
          description: Stock adjusted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdjustStockResponse'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/stock-movements:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [StockMovements]
      operationId: listStockMovements
      summary: List stock movements
      description: Immutable ledger — read-only except creation via operations.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: productVariantId
          in: query
          schema:
            type: string
            format: uuid
        - name: inventoryItemId
          in: query
          schema:
            type: string
            format: uuid
        - name: movementType
          in: query
          schema:
            $ref: '#/components/schemas/StockMovementType'
      responses:
        '200':
          description: Paginated list of stock movements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementCursorPage'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/stock-movements/{movementId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/MovementId'
    get:
      tags: [StockMovements]
      operationId: getStockMovement
      summary: Get stock movement by ID
      responses:
        '200':
          description: Stock movement details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovement'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/suppliers:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Suppliers]
      operationId: listSuppliers
      summary: List suppliers
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of suppliers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Suppliers]
      operationId: createSupplier
      summary: Create supplier
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierCreate'
      responses:
        '201':
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/suppliers/{supplierId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SupplierId'
    get:
      tags: [Suppliers]
      operationId: getSupplier
      summary: Get supplier by ID
      responses:
        '200':
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Suppliers]
      operationId: updateSupplier
      summary: Update supplier
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierUpdate'
      responses:
        '200':
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Suppliers]
      operationId: deleteSupplier
      summary: Soft-delete supplier
      description: Blocked if open purchase orders exist.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Supplier deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/purchase-orders:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [PurchaseOrders]
      operationId: listPurchaseOrders
      summary: List purchase orders
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PurchaseOrderStatus'
        - name: supplierId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of purchase orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [PurchaseOrders]
      operationId: createPurchaseOrder
      summary: Create purchase order
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCreate'
      responses:
        '201':
          description: Purchase order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/purchase-orders/{purchaseOrderId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/PurchaseOrderId'
    get:
      tags: [PurchaseOrders]
      operationId: getPurchaseOrder
      summary: Get purchase order by ID
      responses:
        '200':
          description: Purchase order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [PurchaseOrders]
      operationId: updatePurchaseOrder
      summary: Update purchase order
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderUpdate'
      responses:
        '200':
          description: Purchase order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [PurchaseOrders]
      operationId: deletePurchaseOrder
      summary: Soft-delete purchase order
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Purchase order deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/purchase-orders/{purchaseOrderId}/receive:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/PurchaseOrderId'
    post:
      tags: [PurchaseOrders]
      operationId: receivePurchaseOrder
      summary: Receive purchase order goods
      description: |
        Records receipt of PO lines, creates stock movements, updates inventory.
        Emits `commercial.purchase_order.received.v1` event.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceivePurchaseOrderRequest'
      responses:
        '200':
          description: Purchase order received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceivePurchaseOrderResponse'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/sales-orders:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [SalesOrders]
      operationId: listSalesOrders
      summary: List sales orders
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SalesOrderStatus'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of sales orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [SalesOrders]
      operationId: createSalesOrder
      summary: Create sales order
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderCreate'
      responses:
        '201':
          description: Sales order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/sales-orders/{salesOrderId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/SalesOrderId'
    get:
      tags: [SalesOrders]
      operationId: getSalesOrder
      summary: Get sales order by ID
      responses:
        '200':
          description: Sales order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [SalesOrders]
      operationId: updateSalesOrder
      summary: Update sales order
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderUpdate'
      responses:
        '200':
          description: Sales order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [SalesOrders]
      operationId: deleteSalesOrder
      summary: Soft-delete sales order
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Sales order deleted
        default:
          $ref: '#/components/responses/Problem'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WarehouseId:
      name: warehouseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InventoryItemId:
      name: inventoryItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MovementId:
      name: movementId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SupplierId:
      name: supplierId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PurchaseOrderId:
      name: purchaseOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SalesOrderId:
      name: salesOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: -createdAt
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      schema:
        type: integer

  responses:
    Problem:
      description: RFC 7807 Problem Details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string
          format: uuid
        code:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string

    Pagination:
