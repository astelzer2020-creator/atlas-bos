openapi: 3.1.0
info:
  title: Atlas BOS CRM API
  version: 1.0.0
  description: |
    Customer Relationship Management API for Atlas BOS.
    Manages accounts, contacts, leads, deals, pipeline stages, and deal activities.
    Aligned with `customer` schema (ATLAS-DB-05).
  contact:
    name: Atlas Platform API Team
    url: https://docs.atlas.example.com
  license:
    name: Proprietary

servers:
  - url: https://api.atlas.example.com
    description: Production
  - url: https://api.staging.atlas.example.com
    description: Staging
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Accounts
    description: CRM account (company) management
  - name: Contacts
    description: Individual contact management
  - name: Leads
    description: Pre-qualification prospect management
  - name: Deals
    description: Sales opportunity management
  - name: PipelineStages
    description: Sales pipeline stage configuration
  - name: DealActivities
    description: Activities attached to deals

paths:
  /v1/organizations/{organizationId}/accounts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: List accounts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: accountType
          in: query
          schema:
            $ref: '#/components/schemas/AccountType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AccountStatus'
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Accounts]
      operationId: createAccount
      summary: Create account
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Get account by ID
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Accounts]
      operationId: updateAccount
      summary: Update account
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Accounts]
      operationId: deleteAccount
      summary: Soft-delete account
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Account deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/contacts:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Contacts]
      operationId: listContacts
      summary: List contacts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ContactStatus'
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Contacts]
      operationId: createContact
      summary: Create contact
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/contacts/{contactId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ContactId'
    get:
      tags: [Contacts]
      operationId: getContact
      summary: Get contact by ID
      responses:
        '200':
          description: Contact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Contacts]
      operationId: updateContact
      summary: Update contact
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdate'
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Contacts]
      operationId: deleteContact
      summary: Soft-delete contact
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Contact deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/contacts/merge:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Contacts]
      operationId: mergeContacts
      summary: Merge duplicate contacts
      description: |
        Merges a source contact into a target contact. Tags, activities, and deal
        references are consolidated. Source contact is soft-deleted.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeContactsRequest'
      responses:
        '200':
          description: Contacts merged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/leads:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Leads]
      operationId: listLeads
      summary: List leads
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/LeadStatus'
        - name: assignedToId
          in: query
          schema:
            type: string
            format: uuid
        - name: leadSource
          in: query
          schema:
            $ref: '#/components/schemas/LeadSource'
      responses:
        '200':
          description: Paginated list of leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Leads]
      operationId: createLead
      summary: Create lead
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadCreate'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/leads/{leadId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/LeadId'
    get:
      tags: [Leads]
      operationId: getLead
      summary: Get lead by ID
      responses:
        '200':
          description: Lead details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Leads]
      operationId: updateLead
      summary: Update lead
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadUpdate'
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Leads]
      operationId: deleteLead
      summary: Soft-delete lead
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Lead deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/leads/{leadId}/convert:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/LeadId'
    post:
      tags: [Leads]
      operationId: convertLead
      summary: Convert lead to contact, account, and optional deal
      description: |
        Transitions lead status to `converted`. Creates contact and optionally
        account and deal. Terminal state — lead cannot be modified after conversion.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertLeadRequest'
      responses:
        '200':
          description: Lead converted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertLeadResponse'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/deals:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Deals]
      operationId: listDeals
      summary: List deals
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DealStatus'
        - name: pipelineStageId
          in: query
          schema:
            type: string
            format: uuid
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of deals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Deals]
      operationId: createDeal
      summary: Create deal
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealCreate'
      responses:
        '201':
          description: Deal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/deals/{dealId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [Deals]
      operationId: getDeal
      summary: Get deal by ID
      responses:
        '200':
          description: Deal details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Deals]
      operationId: updateDeal
      summary: Update deal
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealUpdate'
      responses:
        '200':
          description: Deal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Deals]
      operationId: deleteDeal
      summary: Soft-delete deal
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Deal deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/deals/{dealId}/move-stage:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      operationId: moveDealStage
      summary: Move deal to a different pipeline stage
      description: |
        Updates deal pipeline stage. Emits `customer.deal.stage_changed.v1` domain event.
        Won/lost terminal stages set deal status accordingly.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveDealStageRequest'
      responses:
        '200':
          description: Deal stage moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/pipeline-stages:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [PipelineStages]
      operationId: listPipelineStages
      summary: List pipeline stages
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: pipelineId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of pipeline stages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStageCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [PipelineStages]
      operationId: createPipelineStage
      summary: Create pipeline stage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineStageCreate'
      responses:
        '201':
          description: Pipeline stage created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStage'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/pipeline-stages/{stageId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/StageId'
    get:
      tags: [PipelineStages]
      operationId: getPipelineStage
      summary: Get pipeline stage by ID
      responses:
        '200':
          description: Pipeline stage details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStage'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [PipelineStages]
      operationId: updatePipelineStage
      summary: Update pipeline stage
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineStageUpdate'
      responses:
        '200':
          description: Pipeline stage updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStage'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [PipelineStages]
      operationId: deletePipelineStage
      summary: Soft-delete pipeline stage
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Pipeline stage deleted
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/deals/{dealId}/activities:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [DealActivities]
      operationId: listDealActivities
      summary: List activities for a deal
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - name: activityType
          in: query
          schema:
            $ref: '#/components/schemas/DealActivityType'
        - name: isCompleted
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of deal activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivityCursorPage'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [DealActivities]
      operationId: createDealActivity
      summary: Create deal activity
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealActivityCreate'
      responses:
        '201':
          description: Deal activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivity'
        default:
          $ref: '#/components/responses/Problem'

  /v1/organizations/{organizationId}/deal-activities/{activityId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ActivityId'
    get:
      tags: [DealActivities]
      operationId: getDealActivity
      summary: Get deal activity by ID
      responses:
        '200':
          description: Deal activity details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivity'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [DealActivities]
      operationId: updateDealActivity
      summary: Update deal activity
      description: Subject and description immutable after 24 hours per domain rules.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealActivityUpdate'
      responses:
        '200':
          description: Deal activity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivity'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [DealActivities]
      operationId: deleteDealActivity
      summary: Soft-delete deal activity
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Deal activity deleted
        default:
          $ref: '#/components/responses/Problem'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token with organization scope
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key prefixed with Bearer

  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization (tenant) identifier
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LeadId:
      name: leadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DealId:
      name: dealId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StageId:
      name: stageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque signed cursor for keyset pagination
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: -createdAt
      description: Sort fields; prefix with `-` for descending
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      schema:
        type: integer
      description: Optimistic concurrency version (entity version number)

  responses:
    Problem:
      description: RFC 7807 Problem Details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: https://api.atlas.example.com/errors/validation-failed
        title:
          type: string
          example: Validation Failed
        status:
          type: integer
          example: 422
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string
          format: uuid
        code:
          type: string
          description: Machine-readable error code (domain_entity_reason)
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string

    Pagination:
      type: object
      required: [hasMore, limit]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: [string, 'null']
        prevCursor:
          type: [string, 'null']
        limit:
          type: integer

    CursorPage:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'

    AuditFields:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: [string, 'null']
          format: date-time
        createdBy:
          type: [string, 'null']
          format: uuid
        updatedBy:
          type: [string, 'null']
          format: uuid
        version:
          type: integer
          minimum: 1

    Address:
      type: object
      additionalProperties: true
      properties:
        street1:
          type: string
        street2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    AccountType:
      type: string
      enum: [prospect, customer, partner, vendor, competitor, other]

    AccountStatus:
      type: string
      enum: [active, inactive, archived]

    Account:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          required: [id, organizationId, name, accountType, status, currencyCode]
          properties:
            id:
              type: string
              format: uuid
            organizationId:
              type: string
              format: uuid
            externalId:
              type: [string, 'null']
            name:
              type: string
            legalName:
              type: [string, 'null']
            accountType:
              $ref: '#/components/schemas/AccountType'
            industry:
              type: [string, 'null']
            website:
              type: [string, 'null']
            phone:
              type: [string, 'null']
            email:
              type: [string, 'null']
              format: email
            billingAddress:
              $ref: '#/components/schemas/Address'
            shippingAddress:
              $ref: '#/components/schemas/Address'
            annualRevenue:
              type: [string, 'null']
              description: NUMERIC(19,4) as decimal string
