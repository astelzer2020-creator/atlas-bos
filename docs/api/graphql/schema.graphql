}

enum PrincipalType {
  USER
  SERVICE_ACCOUNT
  API_KEY
  AGENT
  OAUTH_APP
}

type Workspace implements Node & Timestampable {
  id: ID!
  slug: String!
  name: String!
  displayName: String
  owner: User!
