# SUBSCRIPTION ROOT (12 subscriptions)
# ═══════════════════════════════════════════════════════════════════════════════

type Subscription {
  """Real-time deal pipeline updates for kanban boards."""
  dealUpdated(organizationId: ID!, pipelineId: ID): Deal!

  """New and updated contacts for live directory views."""
  contactChanged(organizationId: ID!): Contact!

  """Task board updates for project management views."""
  taskUpdated(organizationId: ID!, projectId: ID): Task!

  """Invoice status changes for AR dashboards."""
  invoiceStatusChanged(organizationId: ID!): Invoice!

  """Support ticket queue updates for agent consoles."""
  ticketUpdated(organizationId: ID!, assigneeId: ID): SupportTicket!

  """Workflow execution progress for automation monitors."""
  workflowRunProgress(organizationId: ID!, workflowId: ID): WorkflowRun!

  """Inbound notifications for the current user."""
  notificationReceived(userId: ID!): Notification!

  """AI agent streaming token responses."""
  aiMessageStream(conversationId: ID!): AiMessage!

  """Campaign send progress and metrics."""
  campaignMetricsUpdated(organizationId: ID!, campaignId: ID!): Campaign!

  """Sales order fulfillment status."""
  salesOrderStatusChanged(organizationId: ID!, orderId: ID): SalesOrder!

  """Organization-wide activity feed."""
  activityFeed(organizationId: ID!): Activity!

  """Global search index refresh signals."""
  searchIndexUpdated(organizationId: ID!, entityType: String): SearchResult!
}