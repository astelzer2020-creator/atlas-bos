}

type NotificationEdge {
  cursor: String!
  node: Notification!
}

type DocumentConnection {
  edges: [DocumentEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type DocumentEdge {
  cursor: String!
  node: Document!
}

type SupportTicketConnection {
  edges: [SupportTicketEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type SupportTicketEdge {
