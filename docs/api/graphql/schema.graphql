# Atlas BOS GraphQL Schema — Phase 5
# Endpoint: https://api.atlas.example.com/graphql
# Version: 2026-06-30
# Specification: GraphQL June 2024 (SDL)

"""
Atlas BOS unified GraphQL API for composite reads, dashboards, and mobile clients.
REST remains the source of truth for mutations invoked by integrations and AI agents;
GraphQL mutations mirror REST capabilities for SPA/mobile convenience.
"""
schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# ═══════════════════════════════════════════════════════════════════════════════
# SCALARS & COMMON INTERFACES
# ═══════════════════════════════════════════════════════════════════════════════

scalar DateTime
scalar JSON
scalar BigInt
scalar URL
scalar EmailAddress
scalar PhoneNumber
scalar CurrencyCode
scalar ULID

interface Node {
  id: ID!
}

interface Timestampable {
  createdAt: DateTime!
  updatedAt: DateTime!
}

interface TenantScoped implements Node & Timestampable {
  id: ID!
  organizationId: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
  version: Int!
}

interface Actor {
  id: ID!
  displayName: String!
}

# ═══════════════════════════════════════════════════════════════════════════════
# PAGINATION (Relay Connection Pattern)
# ═══════════════════════════════════════════════════════════════════════════════

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type OrganizationConnection {
  edges: [OrganizationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type OrganizationEdge {
  cursor: String!
  node: Organization!
}

type ContactConnection {
  edges: [ContactEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ContactEdge {
  cursor: String!
  node: Contact!
}

type AccountConnection {
  edges: [AccountEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AccountEdge {
  cursor: String!
  node: Account!
}

type LeadConnection {
  edges: [LeadEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type LeadEdge {
  cursor: String!
  node: Lead!
}

type DealConnection {
  edges: [DealEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type DealEdge {
  cursor: String!
  node: Deal!
}

type ProjectConnection {
  edges: [ProjectEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProjectEdge {
  cursor: String!
  node: Project!
}

type TaskConnection {
  edges: [TaskEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type TaskEdge {
  cursor: String!
  node: Task!
}

type InvoiceConnection {
  edges: [InvoiceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type InvoiceEdge {
  cursor: String!
  node: Invoice!
}

type EmployeeConnection {
  edges: [EmployeeEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EmployeeEdge {
  cursor: String!
  node: Employee!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProductEdge {
  cursor: String!
  node: Product!
}

type SalesOrderConnection {
  edges: [SalesOrderEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type SalesOrderEdge {
  cursor: String!
  node: SalesOrder!
}

type CampaignConnection {
  edges: [CampaignEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CampaignEdge {
  cursor: String!
  node: Campaign!
}

type WorkflowConnection {
  edges: [WorkflowEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type WorkflowEdge {
  cursor: String!
  node: Workflow!
}

type NotificationConnection {
  edges: [NotificationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
