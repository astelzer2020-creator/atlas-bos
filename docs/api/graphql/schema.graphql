}

# ═══════════════════════════════════════════════════════════════════════════════
# VALUE OBJECTS
# ═══════════════════════════════════════════════════════════════════════════════

type Money {
  amountCents: BigInt!
  currencyCode: CurrencyCode!
  formatted: String!
}

type Address {
  line1: String
  line2: String
  city: String
  state: String
  postalCode: String
  countryCode: String
  formatted: String
}

type AuditInfo {
  createdBy: User
  updatedBy: User
  deletedAt: DateTime
}

type ErrorDetail {
  field: String
  code: String!
  message: String!
}

type MutationError {
  code: String!
  message: String!
  details: [ErrorDetail!]
}

# ═══════════════════════════════════════════════════════════════════════════════
# PLATFORM & IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

enum OrganizationStatus {
  PROVISIONING
  ACTIVE
  SUSPENDED
  ARCHIVED
}

enum IsolationTier {
  SHARED_RLS
  DEDICATED_SCHEMA
  DEDICATED_CLUSTER
}

enum MembershipStatus {
  ACTIVE
  INVITED
  SUSPENDED
